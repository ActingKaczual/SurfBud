# ── SURF BUD · config ────────────────────────────────────────
# The system watches EVENTS, not spots. Spots live in spots.yaml.

timezone: America/New_York

# Per-class lead horizons (days): [whisper, heads_up, confirmed]
event_classes:
  tropical: {horizons: [12, 8, 4]}
  winter_groundswell: {horizons: [10, 7, 4]}
  noreaster: {horizons: [7, 5, 2.5]}
  lake_wind: {horizons: [4, 2.5, 1.5]}
  windswell: {horizons: [0, 3, 1.5]}   # 0 = no whisper stage

alerts:
  max_pushes_per_day: 2
  quiet_hours: [21, 7]          # local, queue overnight, flush at 7am run
  lake_push_min_grade: good     # lake stream is lower-key: push only good+
  outlook_day: Sunday           # only sent when something's brewing

# Scoring weights, your ranked order (must sum to 1.0)
weights:
  confidence: 0.30
  window_consistency: 0.25
  wind_cleanliness: 0.20
  wave_match: 0.15
  travel_efficiency: 0.10

# Rider profile distilled from RIDER PROFILE v3 (drives fit %)
profile:
  size_sweet_m: [0.6, 1.3]      # waist to chest, meters face-ish
  size_ok_m: [0.4, 1.8]         # knee-waist and chest-head shoulder seasons
  min_period_pref_s: 9
  wind_clean_max_mph: 12
  wind_ok_max_mph: 18
  home: {lat: 42.44, lon: -76.50}   # Ithaca

# OCEAN engine sweep grid: sentinels detect arrivals early, coastal confirm.
ocean_grid:
  sentinels:   # offshore points, long-period energy here = something coming
    - {name: "Gulf of Maine outer", lat: 42.6, lon: -68.5}
    - {name: "South of Nantucket", lat: 40.2, lon: -69.5}
    - {name: "Hudson Canyon", lat: 39.5, lon: -72.0}
    - {name: "Mid-Atlantic outer", lat: 37.8, lon: -73.5}
  coastal:
    - {name: "York ME", lat: 43.15, lon: -70.55}
    - {name: "Rye NH", lat: 43.00, lon: -70.72}
    - {name: "Cape Cod east", lat: 41.85, lon: -69.90}
    - {name: "Narragansett RI", lat: 41.40, lon: -71.45}
    - {name: "Montauk", lat: 41.03, lon: -71.90}
    - {name: "Long Beach LI", lat: 40.57, lon: -73.65}
    - {name: "Rockaway", lat: 40.55, lon: -73.80}
    - {name: "Manasquan NJ", lat: 40.10, lon: -74.02}
    - {name: "LBI NJ", lat: 39.60, lon: -74.17}

lake_grid:
  - {name: "Oswego east", lat: 43.47, lon: -76.45, region: NY, drive_hours: 1.25, drive_miles: 60}
  - {name: "Fair Haven", lat: 43.35, lon: -76.70, region: NY, drive_hours: 1.5, drive_miles: 65}
  - {name: "Sodus", lat: 43.28, lon: -76.98, region: NY, drive_hours: 1.75, drive_miles: 80}

lake_rules:
  min_wind_mph: 18
  wind_dir_deg: [240, 330]      # W-NW fetch for the east end
  min_sustained_hours: 4

fares:
  enabled: true                  # snapshot on fly-relevant CONFIRMED only
  origins: [ITH, SYR, ROC]
  max_price_usd: 500
  currency: USD
